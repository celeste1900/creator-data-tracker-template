                                    panel.innerHTML = '<div style="color:#999; text-align:center;">悬停图表查看详情</div>';
                                    return;
                                }

                                const date = fullDates[idx];
                                const totalViews = pageViews[idx];
                                const pageData = pageDataMap[date] || [];

                                let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;">
                                    <span style="font-weight:bold; font-size:14px;">${labels[idx]}</span>
                                    <div style="display:flex; gap:16px;">`;

                                if (currentGATab === 'all' && users && newUsers) {
                                    html += `<span><span style="color:#10b981;">●</span> UV: <b>${users[idx]}</b></span>
                                        <span><span style="color:#f59e0b;">●</span> 新访客: <b>${newUsers[idx]}</b></span>`;
                                }

                                const colorDot = currentGATab === 'frontend' ? '#3b82f6' : currentGATab === 'backend' ? '#f59e0b' : '#4f46e5';
                                const viewLabel = currentGATab === 'frontend' ? '前台 PV' : currentGATab === 'backend' ? '后台 PV' : 'PV';
                                html += `<span><span style="color:${colorDot};">●</span> ${viewLabel}: <b>${totalViews}</b></span>
                                    </div>
                                </div>`;

                                if (pageData.length > 0) {
                                    html += '<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:6px;">';
                                    let detailSum = 0;
                                    pageData.forEach(p => {
                                        html += `<div style="display:flex; justify-content:space-between; padding:4px 8px; background:#fff; border-radius:4px;"><span style="color:#666; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${p.page}</span><span style="font-weight:500; margin-left:8px;">${p.views}</span></div>`;
                                        detailSum += p.views;
                                    });
                                    const otherViews = totalViews - detailSum;
                                    if (otherViews > 0) {
                                        html += `<div style="display:flex; justify-content:space-between; padding:4px 8px; background:#fff; border-radius:4px;"><span style="color:#999;">其他页面</span><span style="font-weight:500; margin-left:8px;">${otherViews}</span></div>`;
                                    }
                                    html += '</div>';
                                }

                                panel.innerHTML = html;
                            }
                        },

                    },
                    scales: {
                        y: {
                            type: 'linear',
                            position: 'left',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'UV'
                            }
                        },
                        y1: {
                            type: 'linear',
                            position: 'right',
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'PV'
                            },
                            grid: {
                                drawOnChartArea: false
                            }
                        }
                    }
                }
            });
            fitChartWidth(labels.length);
        }

        // 渲染热门内容
        function renderHotContent() {
            const container = document.getElementById('hotContentList');
            if (!platformData) {
                container.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }

            const allWorks = [];
            ['douyin', 'xiaohongshu', 'shipinhao'].forEach(platform => {
                const data = platformData[platform];
                if (data && data.works) {
                    data.works.forEach(work => {
                        allWorks.push({ ...work, platformKey: platform });
                    });
                }
            });

            allWorks.sort((a, b) => (b.views || 0) - (a.views || 0));
            const top5 = allWorks.slice(0, 5);

            container.innerHTML = top5.map((work, index) => {
                const config = platformConfig[work.platformKey];
                const rankClass = index < 3 ? `rank-${index + 1}` : 'rank-other';
                return `
                    <div class="content-item">
                        <div class="content-rank ${rankClass}">${index + 1}</div>
                        <div class="content-info">
                            <div class="content-title" title="${work.title}">${work.title || '无标题'}</div>
                            <div class="content-meta">
                                <img src="${config.icon}" alt="${config.name}">
                                <span>${config.name}</span>
                                ${work.publish_time ? `<span>· ${work.publish_time}</span>` : ''}
                            </div>
                        </div>
                        <div class="content-stats">
                            <div class="content-stats-value">${formatNumber(work.views)}</div>
                            <div>播放</div>
                        </div>
                    </div>
                `;
            }).join('') || '<div class="loading">暂无数据</div>';
        }

        // 周期选择器事件
        document.querySelectorAll('.period-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPeriod = parseInt(btn.dataset.period);
                renderPlatforms();
                renderGA(); // 同时更新 GA 数据对比
            });
        });

        // 渲染订单数据区域（含图表切换按钮）
        function renderOrdersSection() {
            const section = document.getElementById('ordersSection');
            if (!section) return;
            section.innerHTML = getOrdersSectionHtml();
            // 同步更新 sticky tabs bar
            const sticky = document.getElementById('chartTabsSticky');
            if (sticky) {
                const isAll = currentGATab === 'all';
                if (isAll) {
                    sticky.innerHTML = getChartTabsHtml();
                    sticky.style.display = 'none'; // 默认隐藏，滚动后显示
                    bindStickyChartTabEvents();
                    // 监听原始 chartTabs 是否在视口内
                    if (window._chartTabsObserver) window._chartTabsObserver.disconnect();
                    const originalTabs = document.getElementById('chartTabs');
                    if (originalTabs) {
                        window._chartTabsObserver = new IntersectionObserver(([entry]) => {
                            sticky.style.display = entry.isIntersecting ? 'none' : '';
                        }, { threshold: 0 });
                        window._chartTabsObserver.observe(originalTabs);
                    }
                } else {
                    sticky.style.display = 'none';
                    if (window._chartTabsObserver) window._chartTabsObserver.disconnect();
                }
            }
            bindChartTabEvents();
        }

        function bindStickyChartTabEvents() {
            const sticky = document.getElementById('chartTabsSticky');
            if (!sticky) return;
            sticky.querySelectorAll('.chart-tab').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (chartCollapsed) {
                        chartCollapsed = false;
                        const content = document.getElementById('chartContent');
                        if (content) content.style.display = '';
                        document.querySelectorAll('#chartCollapseBtn').forEach(b => b.textContent = '收起 ▲');
                    }
                    switchChart(this.dataset.chart);
                });
            });
            sticky.querySelectorAll('#chartCollapseBtn').forEach(btn => {
                btn.addEventListener('click', function() {
                    chartCollapsed = !chartCollapsed;
                    const content = document.getElementById('chartContent');
                    if (content) content.style.display = chartCollapsed ? 'none' : '';
                    document.querySelectorAll('#chartCollapseBtn').forEach(b => {
                        b.textContent = chartCollapsed ? '展开 ▼' : '收起 ▲';
                    });
                });
            });
        }

        // 绑定图表tab和收起按钮事件
        function bindChartTabEvents() {
            document.querySelectorAll('.chart-tab').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (chartCollapsed) {
                        chartCollapsed = false;
                        const content = document.getElementById('chartContent');
                        if (content) content.style.display = '';
                        const collapseBtn = document.getElementById('chartCollapseBtn');
                        if (collapseBtn) collapseBtn.textContent = '收起 ▲';
                    }
                    switchChart(this.dataset.chart);
                });
            });
            const collapseBtn = document.getElementById('chartCollapseBtn');
            if (collapseBtn) {
                collapseBtn.addEventListener('click', function() {
                    chartCollapsed = !chartCollapsed;
                    const content = document.getElementById('chartContent');
                    if (content) content.style.display = chartCollapsed ? 'none' : '';
                    this.textContent = chartCollapsed ? '展开 ▼' : '收起 ▲';
                });
            }
        }

        // 生成图表切换按钮 HTML
        function getChartTabsHtml() {
            const isAll = currentGATab === 'all';
            const regStyle = isAll ? '' : 'display:none;';
            const ordersStyle = isAll ? '' : 'display:none;';
            return '<button class="chart-tab' + (currentChartTab === 'pvuv' ? ' active' : '') + '" data-chart="pvuv">PV/UV</button>' +
                '<button class="chart-tab' + (currentChartTab === 'reg' ? ' active' : '') + '" data-chart="reg" style="' + regStyle + '">注册趋势</button>' +
                '<button class="chart-tab' + (currentChartTab === 'orders' ? ' active' : '') + '" data-chart="orders" style="' + ordersStyle + '">下单趋势</button>' +
                '<button id="chartCollapseBtn" style="background:none;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;color:#666;cursor:pointer;">' +
                    (chartCollapsed ? '展开 ▼' : '收起 ▲') +
                '</button>';
        }

        // 生成订单横条 + 图表切换 HTML（5列grid，3:2对齐指标行）
        function getOrdersSectionHtml() {
            const isAll = currentGATab === 'all';
            const hasOrders = isAll && platformData && platformData.orders && platformData.orders.length > 0;

            // 前台/后台tab不显示订单和图表切换
            if (!isAll) return '';

            if (!hasOrders) {
                return '<div class="orders-row">' +
                    '<div style="grid-column:1/4;"></div>' +
                    '<div class="chart-tabs-bar" id="chartTabs">' + getChartTabsHtml() + '</div>' +
                '</div>';
            }

            const orders = platformData.orders;
            const latest = orders[orders.length - 1];

            let countChange = '', amountChange = '';
            if (currentPeriod === 1 && orders.length >= 2) {
                // vs 昨天：对比最后两条记录
                const prev = orders[orders.length - 2];
                countChange = formatOrderChange(latest.order_count - prev.order_count, false);
                amountChange = formatOrderChange(latest.order_amount - prev.order_amount, true);
            } else {
                const targetDate = getDateDaysAgo(currentPeriod);
                const oldRecord = orders.filter(o => o.date <= targetDate).pop();
                if (oldRecord && oldRecord !== latest) {
                    countChange = formatOrderChange(latest.order_count - oldRecord.order_count, false);
                    amountChange = formatOrderChange(latest.order_amount - oldRecord.order_amount, true);
                }
            }

            return '<div class="orders-row">' +
                '<div class="orders-bar" id="ordersBar">' +
                    '<div class="orders-bar-icon">&#x1F4E6;</div>' +
                    '<div class="orders-bar-metrics">' +
                        '<div class="orders-bar-metric">' +
                            '<div class="orders-bar-value">' + latest.order_count.toLocaleString() + '</div>' +
                            '<div class="orders-bar-label">累计订单</div>' +
                        '</div>' +
                        '<div class="orders-bar-metric">' +
                            '<div class="orders-bar-change">' + (countChange || '<span style="color:#999">-</span>') + '</div>' +
                            '<div class="orders-bar-label">新增</div>' +
                        '</div>' +
                        '<div class="orders-bar-divider"></div>' +
                        '<div class="orders-bar-metric">' +
                            '<div class="orders-bar-value">$' + latest.order_amount.toLocaleString() + '</div>' +
                            '<div class="orders-bar-label">累计金额</div>' +
                        '</div>' +
                        '<div class="orders-bar-metric">' +
                            '<div class="orders-bar-change">' + (amountChange || '<span style="color:#999">-</span>') + '</div>' +
                            '<div class="orders-bar-label">新增</div>' +
                        '</div>' +
                    '</div>' +
                '</div>' +
                '<div class="chart-tabs-bar" id="chartTabs">' + getChartTabsHtml() + '</div>' +
            '</div>';
        }

        function formatOrderChange(diff, isMoney) {
            if (diff === 0) return '<span class="change-zero">-</span>';
            const cls = diff > 0 ? 'change-up' : 'change-down';
            const sign = diff > 0 ? '+' : '-';
            const val = isMoney ? '$' + Math.abs(diff).toLocaleString() : Math.abs(diff).toLocaleString();
            return '<span class="' + cls + '">' + sign + val + '</span>';
        }

        // 是否正在显示订单图表
        let showingOrdersChart = false;

        // 渲染订单趋势图（双柱状图 + 滚动明细表）
        function renderOrdersChart() {
            if (gaChart) gaChart.destroy();
            showingOrdersChart = true;

            if (!platformData || !platformData.orders || platformData.orders.length === 0) return;

            const orders = platformData.orders;
            const labels = orders.map(o => o.date.slice(5));

            // 计算每日增量
            const dailyCounts = [];
            const dailyAmounts = [];
            for (let i = 0; i < orders.length; i++) {
                if (i === 0) {
                    dailyCounts.push(orders[i].order_count);
                    dailyAmounts.push(orders[i].order_amount);
                } else {
                    dailyCounts.push(orders[i].order_count - orders[i - 1].order_count);
                    dailyAmounts.push(orders[i].order_amount - orders[i - 1].order_amount);
                }
            }

            gaChart = new Chart(document.getElementById('gaChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '新增订单',
                            data: dailyCounts,
                            backgroundColor: 'rgba(186, 101, 71, 0.7)',
                            borderRadius: 4,
                            yAxisID: 'y'
                        },
                        {
                            label: '新增金额 ($)',
                            data: dailyAmounts,
                            backgroundColor: 'rgba(79, 70, 229, 0.6)',
                            borderRadius: 4,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { position: 'top' },
                        tooltip: {
                            callbacks: {
                                title: function(items) {
                                    return orders[items[0].dataIndex].date;
                                },
                                afterBody: function(items) {
                                    const idx = items[0].dataIndex;
                                    const o = orders[idx];
                                    let tip = '\n累计: ' + o.order_count + ' 单 / $' + o.order_amount.toLocaleString();
                                    if (o.new_users > 0) {
                                        const conv = (dailyCounts[idx] / o.new_users * 100).toFixed(1);
                                        tip += '\n新注册: ' + o.new_users + ' 人 | 转化率: ' + conv + '%';
                                    }
                                    return tip;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { type: 'linear', position: 'left', beginAtZero: true, title: { display: true, text: '订单数' } },
                        y1: { type: 'linear', position: 'right', beginAtZero: true, title: { display: true, text: '金额 ($)' }, grid: { drawOnChartArea: false } }
                    }
                }
            });
            fitChartWidth(labels.length);

            // 显示明细面板并填充滚动明细表
            const panel = document.getElementById('gaPageDetail');
            panel.style.display = '';
            let tableHtml = '<div style="max-height:180px; overflow-y:auto;">' +
                '<table style="width:100%; border-collapse:collapse; font-size:13px;">' +
                '<thead style="position:sticky; top:0; background:#f8f9fa;">' +
                '<tr style="border-bottom:2px solid #e5e7eb; text-align:right;">' +
                '<th style="text-align:left; padding:6px 8px;">日期</th>' +
                '<th style="padding:6px 8px; color:#6366f1;">新注册</th>' +
                '<th style="padding:6px 8px; color:#ba6547;">新订单</th>' +
                '<th style="padding:6px 8px; color:#4f46e5;">新金额</th>' +
                '<th style="padding:6px 8px; color:#10b981;">转化率</th>' +
                '<th style="padding:6px 8px;">累计注册</th>' +
                '<th style="padding:6px 8px;">累计订单</th>' +
                '<th style="padding:6px 8px;">累计金额</th>' +
                '</tr></thead><tbody>';
            for (let i = orders.length - 1; i >= 0; i--) {
                const o = orders[i];
                const dc = dailyCounts[i];
                const da = dailyAmounts[i];
                const nu = o.new_users || 0;
                const cu = o.cumulative_users || 0;
                const conv = nu > 0 ? (dc / nu * 100).toFixed(1) + '%' : '-';
                const isZero = dc === 0 && da === 0 && nu === 0;
                const rowStyle = isZero ? 'color:#ccc;' : '';
                tableHtml += '<tr style="border-bottom:1px solid #f0f0f0; text-align:right;' + rowStyle + '">' +
                    '<td style="text-align:left; padding:5px 8px;">' + o.date.slice(5) + '</td>' +
                    '<td style="padding:5px 8px; font-weight:600; color:#6366f1;">' + (nu > 0 ? '+' + nu : '-') + '</td>' +
                    '<td style="padding:5px 8px; font-weight:600; color:#ba6547;">' + (dc > 0 ? '+' + dc : '-') + '</td>' +
                    '<td style="padding:5px 8px; font-weight:600; color:#4f46e5;">' + (da > 0 ? '+$' + da.toLocaleString() : '-') + '</td>' +
                    '<td style="padding:5px 8px; color:#10b981; font-weight:600;">' + conv + '</td>' +
                    '<td style="padding:5px 8px;">' + (cu > 0 ? cu : '-') + '</td>' +
                    '<td style="padding:5px 8px;">' + o.order_count + '</td>' +
                    '<td style="padding:5px 8px;">$' + o.order_amount.toLocaleString() + '</td>' +
                '</tr>';
            }
            tableHtml += '</tbody></table></div>';
            panel.innerHTML = tableHtml;
        }

        // 注册来源排序状态
        let signupSourceSort = { field: 'orders', desc: true };
        let signupSourcePeriod = 30; // 独立的时间周期

        function bindSignupSourceTabs() {
            document.querySelectorAll('.signup-source-tab').forEach(btn => {
                btn.addEventListener('click', function() {
                    signupSourcePeriod = parseInt(this.dataset.days);
                    // 更新 tab 样式
                    document.querySelectorAll('.signup-source-tab').forEach(b => {
                        b.style.background = '#fff';
                        b.style.color = '#666';
                        b.style.borderColor = '#e5e7eb';
                    });
                    this.style.background = '#4f46e5';
                    this.style.color = '#fff';
                    this.style.borderColor = '#4f46e5';
                    renderSignupBySource();
                });
            });
        }

        // 渲染注册来源转化率排行
        function renderSignupBySource() {
            const container = document.getElementById('signupBySourceTable');
            if (!container || !gaData) return;

            const sourceData = signupSourcePeriod <= 1
                ? gaData.signup_by_source_1d
                : signupSourcePeriod <= 7
                    ? gaData.signup_by_source_7d
                    : gaData.signup_by_source_30d;

            if (!sourceData || sourceData.length === 0) {
                container.textContent = '暂无数据';
                return;
            }

            const filtered = sourceData.filter(s =>
                s.source !== '(not set)' &&
                s.source !== 'footer' &&
                s.source !== 'website' &&
                s.source !== 'checkout.stripe.com'
            );

            // 排序
            const sorted = [...filtered].sort((a, b) => {
                const av = a[signupSourceSort.field] || 0;
                const bv = b[signupSourceSort.field] || 0;
                return signupSourceSort.desc ? bv - av : av - bv;
            });

            const table = document.createElement('table');
            table.style.cssText = 'width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;';

            const columns = [
                { label: '来源', field: 'source', align: 'left' },
                { label: '新访客', field: 'new_visitors', align: 'right' },
                { label: '注册', field: 'signups', align: 'right' },
                { label: '注册率', field: 'conversion_rate', align: 'right' },
                { label: '下单', field: 'orders', align: 'right' },
                { label: '下单率', field: 'order_rate', align: 'right' },
            ];

            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            headerRow.style.borderBottom = '2px solid #e5e7eb';
            columns.forEach(col => {
                const th = document.createElement('th');
                th.style.cssText = 'padding:6px 8px;text-align:' + col.align + ';cursor:pointer;user-select:none;white-space:nowrap;';
                const labelSpan = document.createElement('span');
                labelSpan.textContent = col.label;
                th.appendChild(labelSpan);
                if (col.field !== 'source') {
                    const arrow = document.createElement('span');
                    arrow.style.cssText = 'margin-left:3px;font-size:11px;';
                    if (signupSourceSort.field === col.field) {
                        arrow.textContent = signupSourceSort.desc ? ' \u2193' : ' \u2191';
                        arrow.style.color = '#4f46e5';
                    } else {
                        arrow.textContent = ' \u2195';
                        arrow.style.color = '#ccc';
                    }
                    th.appendChild(arrow);
                    th.onclick = () => {
                        if (signupSourceSort.field === col.field) {
                            signupSourceSort.desc = !signupSourceSort.desc;
                        } else {
                            signupSourceSort = { field: col.field, desc: true };
                        }
                        renderSignupBySource();
                    };
                    th.onmouseenter = () => th.style.background = '#f9fafb';
                    th.onmouseleave = () => th.style.background = '';
                }
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            function makeRateCell(rate, thresholdHigh, thresholdMid) {
                const color = rate >= thresholdHigh ? '#10b981' : rate >= thresholdMid ? '#f59e0b' : '#6b7280';
                const td = document.createElement('td');
                td.style.cssText = 'padding:5px 8px;text-align:right;';
                const wrap = document.createElement('div');
                wrap.style.cssText = 'display:flex;align-items:center;justify-content:flex-end;gap:6px;';
                const barBg = document.createElement('div');
                barBg.style.cssText = 'width:40px;height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;';
                const barFill = document.createElement('div');
                barFill.style.cssText = 'width:' + Math.min(rate, 100) + '%;height:100%;background:' + color + ';border-radius:3px;';
                barBg.appendChild(barFill);
                const text = document.createElement('span');
                text.textContent = rate + '%';
                text.style.cssText = 'color:' + color + ';font-weight:600;min-width:42px;';
                wrap.appendChild(barBg);
                wrap.appendChild(text);
                td.appendChild(wrap);
                return td;
            }

            const tbody = document.createElement('tbody');
            sorted.forEach(s => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #f3f4f6';

                const tdSource = document.createElement('td');
                tdSource.style.cssText = 'padding:5px 8px;font-weight:500;';
                const sourceName = document.createElement('span');
                sourceName.textContent = s.source;
                tdSource.appendChild(sourceName);
                if (s.source === '(direct)') {
                    const hint = document.createElement('span');
                    hint.textContent = ' 含搜索域名、书签、微信/飞书等App内打开';
                    hint.style.cssText = 'font-size:11px;color:#999;font-weight:normal;';
                    tdSource.appendChild(hint);
                }

                const tdVisitors = document.createElement('td');
                tdVisitors.textContent = s.new_visitors;
                tdVisitors.style.cssText = 'padding:5px 8px;text-align:right;';

                const tdSignups = document.createElement('td');
                tdSignups.textContent = s.signups;
                tdSignups.style.cssText = 'padding:5px 8px;text-align:right;font-weight:600;color:#4f46e5;';

                const tdRegRate = makeRateCell(s.conversion_rate, 40, 20);

                const tdOrders = document.createElement('td');
                tdOrders.textContent = s.orders || 0;
                tdOrders.style.cssText = 'padding:5px 8px;text-align:right;font-weight:600;color:#ba6547;';

                const tdOrderRate = makeRateCell(s.order_rate || 0, 30, 15);

                tr.appendChild(tdSource);
                tr.appendChild(tdVisitors);
                tr.appendChild(tdSignups);
                tr.appendChild(tdRegRate);
                tr.appendChild(tdOrders);
                tr.appendChild(tdOrderRate);
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);

            container.replaceChildren(table);
        }

        // 初始化
        loadPlatformData();
        loadGAData();
    </script>
</body>
</html>
